<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
    <linearGradient id="layer1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/></linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/></linearGradient>
    <linearGradient id="layer4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ef4444"/><stop offset="100%" stop-color="#dc2626"/></linearGradient>
    <linearGradient id="crossCut" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="750" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">Application Architecture</text>
  <text x="500" y="48" text-anchor="middle" font-size="12" fill="#64748b">DMG Movie Ticket Booking System — Layered Spring Boot Architecture</text>

  <!-- ==================== LAYER 1: CONTROLLER ==================== -->
  <g filter="url(#shadow)">
    <rect x="30" y="65" width="940" height="120" rx="8" fill="white" stroke="#bfdbfe" stroke-width="2"/>
    <rect x="30" y="65" width="940" height="32" rx="8" fill="url(#layer1)"/>
    <rect y="89" x="30" width="940" height="8" fill="url(#layer1)"/>
    <text x="500" y="86" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Presentation Layer — REST Controllers</text>

    <!-- Controller boxes -->
    <g transform="translate(50, 108)">
      <rect width="130" height="28" rx="14" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
      <text x="65" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">AuthController</text>
    </g>
    <g transform="translate(195, 108)">
      <rect width="130" height="28" rx="14" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
      <text x="65" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">BookingController</text>
    </g>
    <g transform="translate(340, 108)">
      <rect width="130" height="28" rx="14" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
      <text x="65" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">CityController</text>
    </g>
    <g transform="translate(485, 108)">
      <rect width="140" height="28" rx="14" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
      <text x="70" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">ScreenController</text>
    </g>
    <g transform="translate(195, 143)">
      <rect width="130" height="28" rx="14" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
      <text x="65" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">ShowController</text>
    </g>
    <g transform="translate(340, 143)">
      <rect width="150" height="28" rx="14" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
      <text x="75" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">TheaterController</text>
    </g>
    <g transform="translate(505, 143)">
      <rect width="150" height="28" rx="14" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
      <text x="75" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">PricingController</text>
    </g>
    <g transform="translate(670, 143)">
      <rect width="150" height="28" rx="14" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
      <text x="75" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">DiscountCodeCtlr</text>
    </g>
    <g transform="translate(835, 143)">
      <rect width="120" height="28" rx="14" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
      <text x="60" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">HealthCtlr</text>
    </g>
  </g>

  <!-- Arrow between layers -->
  <line x1="500" y1="190" x2="500" y2="210" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>
  <marker id="arrowDown" markerWidth="10" markerHeight="8" refX="5" refY="8" orient="auto">
    <path d="M0,0 L5,8 L10,0" fill="#94a3b8"/>
  </marker>

  <!-- ==================== LAYER 2: SERVICE ==================== -->
  <g filter="url(#shadow)">
    <rect x="30" y="215" width="940" height="130" rx="8" fill="white" stroke="#a7f3d0" stroke-width="2"/>
    <rect x="30" y="215" width="940" height="32" rx="8" fill="url(#layer2)"/>
    <rect y="239" x="30" width="940" height="8" fill="url(#layer2)"/>
    <text x="500" y="236" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Business Logic Layer — Services</text>

    <g transform="translate(50, 258)">
      <rect width="140" height="42" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
      <text x="70" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">BookingService</text>
      <text x="70" y="34" text-anchor="middle" font-size="9" fill="#047857">Hold → Pay → Cancel → Refund</text>
    </g>
    <g transform="translate(205, 258)">
      <rect width="140" height="42" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
      <text x="70" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">LoginService</text>
      <text x="70" y="34" text-anchor="middle" font-size="9" fill="#047857">Auth + JWT generation</text>
    </g>
    <g transform="translate(360, 258)">
      <rect width="140" height="42" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
      <text x="70" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">UserService</text>
      <text x="70" y="34" text-anchor="middle" font-size="9" fill="#047857">Registration &amp; profile</text>
    </g>
    <g transform="translate(515, 258)">
      <rect width="140" height="42" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
      <text x="70" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">ShowService</text>
      <text x="70" y="34" text-anchor="middle" font-size="9" fill="#047857">Show management</text>
    </g>
    <g transform="translate(50, 308)">
      <rect width="140" height="28" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
      <text x="70" y="19" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">SeatLayoutService</text>
    </g>
    <g transform="translate(205, 308)">
      <rect width="140" height="28" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
      <text x="70" y="19" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">PricingService</text>
    </g>
    <g transform="translate(360, 308)">
      <rect width="140" height="28" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
      <text x="70" y="19" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">DiscountCodeService</text>
    </g>
    <g transform="translate(515, 308)">
      <rect width="140" height="28" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
      <text x="70" y="19" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">RefundPolicyService</text>
    </g>
    <g transform="translate(670, 308)">
      <rect width="140" height="28" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
      <text x="70" y="19" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">CityService</text>
    </g>
    <g transform="translate(825, 308)">
      <rect width="130" height="28" rx="6" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
      <text x="65" y="19" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">HealthService</text>
    </g>
  </g>

  <!-- Arrow -->
  <line x1="500" y1="350" x2="500" y2="370" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ==================== LAYER 3: DATA ACCESS ==================== -->
  <g filter="url(#shadow)">
    <rect x="30" y="375" width="940" height="100" rx="8" fill="white" stroke="#fde68a" stroke-width="2"/>
    <rect x="30" y="375" width="940" height="32" rx="8" fill="url(#layer3)"/>
    <rect y="399" x="30" width="940" height="8" fill="url(#layer3)"/>
    <text x="500" y="396" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Data Access Layer — Repositories (Spring Data JPA)</text>

    <g transform="translate(50, 418)">
      <rect width="140" height="28" rx="14" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
      <text x="70" y="19" text-anchor="middle" font-size="10" fill="#92400e">UserRepository</text>
    </g>
    <g transform="translate(205, 418)">
      <rect width="150" height="28" rx="14" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
      <text x="75" y="19" text-anchor="middle" font-size="10" fill="#92400e">BookingRepository</text>
    </g>
    <g transform="translate(370, 418)">
      <rect width="150" height="28" rx="14" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
      <text x="75" y="19" text-anchor="middle" font-size="10" fill="#92400e">BookingSeatRepository</text>
    </g>
    <g transform="translate(535, 418)">
      <rect width="130" height="28" rx="14" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
      <text x="65" y="19" text-anchor="middle" font-size="10" fill="#92400e">SeatRepository</text>
    </g>
    <g transform="translate(50, 450)">
      <rect width="130" height="24" rx="12" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
      <text x="65" y="16" text-anchor="middle" font-size="9" fill="#92400e">ShowRepository</text>
    </g>
    <g transform="translate(195, 450)">
      <rect width="130" height="24" rx="12" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
      <text x="65" y="16" text-anchor="middle" font-size="9" fill="#92400e">ScreenRepository</text>
    </g>
    <g transform="translate(340, 450)">
      <rect width="140" height="24" rx="12" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
      <text x="70" y="16" text-anchor="middle" font-size="9" fill="#92400e">TheaterRepository</text>
    </g>
    <g transform="translate(495, 450)">
      <rect width="140" height="24" rx="12" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
      <text x="70" y="16" text-anchor="middle" font-size="9" fill="#92400e">PricingTierRepository</text>
    </g>
    <g transform="translate(650, 450)">
      <rect width="140" height="24" rx="12" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
      <text x="70" y="16" text-anchor="middle" font-size="9" fill="#92400e">DiscountCodeRepo</text>
    </g>
    <g transform="translate(805, 450)">
      <rect width="150" height="24" rx="12" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
      <text x="75" y="16" text-anchor="middle" font-size="9" fill="#92400e">CityRepository</text>
    </g>
  </g>

  <!-- Arrow -->
  <line x1="500" y1="480" x2="500" y2="500" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- ==================== LAYER 4: DATA STORE ==================== -->
  <g filter="url(#shadow)">
    <rect x="30" y="505" width="940" height="60" rx="8" fill="white" stroke="#fecaca" stroke-width="2"/>
    <rect x="30" y="505" width="940" height="32" rx="8" fill="url(#layer4)"/>
    <rect y="529" x="30" width="940" height="8" fill="url(#layer4)"/>
    <text x="500" y="526" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Data Store</text>

    <g transform="translate(180, 540)">
      <rect width="200" height="20" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
      <text x="100" y="14" text-anchor="middle" font-size="10" font-weight="bold" fill="#991b1b">PostgreSQL / H2 (In-Memory)</text>
    </g>
    <g transform="translate(430, 540)">
      <rect width="200" height="20" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
      <text x="100" y="14" text-anchor="middle" font-size="10" font-weight="bold" fill="#991b1b">Redis (Distributed Seat Holds)</text>
    </g>
    <g transform="translate(680, 540)">
      <rect width="160" height="20" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
      <text x="80" y="14" text-anchor="middle" font-size="10" font-weight="bold" fill="#991b1b">In-Memory Cache (Spring)</text>
    </g>
  </g>

  <!-- ==================== CROSS-CUTTING CONCERNS ==================== -->
  <g filter="url(#shadow)">
    <rect x="30" y="590" width="940" height="145" rx="8" fill="white" stroke="#ddd6fe" stroke-width="2"/>
    <rect x="30" y="590" width="940" height="32" rx="8" fill="url(#crossCut)"/>
    <rect y="614" x="30" width="940" height="8" fill="url(#crossCut)"/>
    <text x="500" y="611" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Cross-Cutting Concerns</text>

    <g transform="translate(55, 632)">
      <rect width="280" height="92" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
      <text x="140" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">Security (Spring Security)</text>
      <text x="10" y="40" font-size="9" fill="#6d28d9">• JWT Bearer token auth (RSA-256)</text>
      <text x="10" y="55" font-size="9" fill="#6d28d9">• Role-based access: ADMIN / CUSTOMER</text>
      <text x="10" y="70" font-size="9" fill="#6d28d9">• JwtAuthenticationFilter extracts token</text>
      <text x="10" y="85" font-size="9" fill="#6d28d9">• Public endpoints: /auth, /health, /swagger</text>
    </g>

    <g transform="translate(360, 632)">
      <rect width="280" height="92" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
      <text x="140" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">Seat Hold Management</text>
      <text x="10" y="40" font-size="9" fill="#6d28d9">• SeatHoldManager (interface)</text>
      <text x="10" y="55" font-size="9" fill="#6d28d9">• RedisSeatHoldManager (distributed)</text>
      <text x="10" y="70" font-size="9" fill="#6d28d9">• InMemorySeatHoldManager (dev/test)</text>
      <text x="10" y="85" font-size="9" fill="#6d28d9">• Lua scripts for atomic operations</text>
    </g>

    <g transform="translate(665, 632)">
      <rect width="290" height="92" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
      <text x="145" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">Other Concerns</text>
      <text x="10" y="40" font-size="9" fill="#6d28d9">• Rate Limiting (sliding window)</text>
      <text x="10" y="55" font-size="9" fill="#6d28d9">• Caching (Spring @Cacheable)</text>
      <text x="10" y="70" font-size="9" fill="#6d28d9">• Async Notifications (@Async)</text>
      <text x="10" y="85" font-size="9" fill="#6d28d9">• Global Exception Handler</text>
    </g>
  </g>
</svg>