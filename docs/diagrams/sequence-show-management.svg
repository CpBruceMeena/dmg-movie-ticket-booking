<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 L2,3.5 Z" fill="#64748b"/>
    </marker>
    <linearGradient id="newBadge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="900" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">City → Theater → Screen → Movie → Show Setup — Sequence Diagram</text>
  <text x="500" y="48" text-anchor="middle" font-size="12" fill="#64748b">Admin workflow for setting up the venue hierarchy, movies, and creating shows</text>

  <!-- ==================== LIFELINES ==================== -->
  <g>
    <!-- Admin -->
    <rect x="55" y="65" width="90" height="28" rx="14" filter="url(#shadow)" fill="#3b82f6"/>
    <text x="100" y="83" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Admin</text>
    <line x1="100" y1="93" x2="100" y2="860" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,4"/>

    <!-- API Controllers -->
    <rect x="250" y="65" width="120" height="28" rx="14" filter="url(#shadow)" fill="#64748b"/>
    <text x="310" y="83" text-anchor="middle" font-size="11" font-weight="bold" fill="white">API Controllers</text>
    <line x1="310" y1="93" x2="310" y2="860" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4"/>

    <!-- Service Layer -->
    <rect x="510" y="65" width="110" height="28" rx="14" filter="url(#shadow)" fill="#10b981"/>
    <text x="565" y="83" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Service Layer</text>
    <line x1="565" y1="93" x2="565" y2="860" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,4"/>

    <!-- Database -->
    <rect x="800" y="65" width="100" height="28" rx="14" filter="url(#shadow)" fill="#ef4444"/>
    <text x="850" y="83" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Database</text>
    <line x1="850" y1="93" x2="850" y2="860" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,4"/>
  </g>

  <!-- ==================== STEP 1: CREATE CITY ==================== -->
  <rect x="20" y="110" width="960" height="24" rx="4" fill="#e2e8f0"/>
  <text x="500" y="127" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">1. City Setup</text>

  <line x1="110" y1="150" x2="300" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="130" y="136" width="155" height="22" rx="11" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="207" y="151" text-anchor="middle" font-size="10" fill="#1d4ed8">POST /api/admin/cities</text>

  <line x1="320" y1="168" x2="555" y2="168" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="345" y="154" width="195" height="22" rx="11" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="442" y="169" text-anchor="middle" font-size="10" fill="#065f46">cityService.createCity(request)</text>

  <line x1="575" y1="186" x2="840" y2="186" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="595" y="172" width="230" height="22" rx="11" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="710" y="187" text-anchor="middle" font-size="10" fill="#991b1b">cityRepository.save(city) → cities table</text>

  <line x1="850" y1="204" x2="575" y2="204" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowHead)"/>
  <rect x="610" y="190" width="155" height="22" rx="11" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="687" y="205" text-anchor="middle" font-size="10" fill="#475569">Return City entity</text>

  <line x1="565" y1="220" x2="320" y2="220" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowHead)"/>
  <rect x="370" y="206" width="155" height="22" rx="11" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="447" y="221" text-anchor="middle" font-size="10" fill="#475569">Return CityResponse</text>

  <line x1="310" y1="236" x2="110" y2="236" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowHead)"/>
  <rect x="140" y="222" width="130" height="22" rx="11" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="205" y="237" text-anchor="middle" font-size="10" fill="#475569">201 Created + city</text>

  <!-- ==================== STEP 2: CREATE THEATER ==================== -->
  <rect x="20" y="265" width="960" height="24" rx="4" fill="#e2e8f0"/>
  <text x="500" y="282" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">2. Theater Setup</text>

  <line x1="110" y1="305" x2="300" y2="305" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="130" y="291" width="180" height="22" rx="11" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="220" y="306" text-anchor="middle" font-size="10" fill="#1d4ed8">POST /api/admin/theaters</text>

  <line x1="320" y1="323" x2="555" y2="323" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="345" y="309" width="195" height="22" rx="11" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="442" y="324" text-anchor="middle" font-size="10" fill="#065f46">theaterService.createTheater(req)</text>

  <line x1="575" y1="341" x2="840" y2="341" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="595" y="327" width="235" height="22" rx="11" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="712" y="342" text-anchor="middle" font-size="10" fill="#991b1b">theaterRepository.save(theater) → theaters [city_id FK]</text>

  <!-- ==================== STEP 3: CREATE SCREEN ==================== -->
  <rect x="20" y="370" width="960" height="24" rx="4" fill="#e2e8f0"/>
  <text x="500" y="387" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">3. Screen Setup</text>

  <line x1="110" y1="410" x2="300" y2="410" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="130" y="396" width="180" height="22" rx="11" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="220" y="411" text-anchor="middle" font-size="10" fill="#1d4ed8">POST /api/admin/screens</text>

  <line x1="320" y1="428" x2="555" y2="428" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="345" y="414" width="195" height="22" rx="11" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="442" y="429" text-anchor="middle" font-size="10" fill="#065f46">screenService.createScreen(req)</text>

  <line x1="575" y1="446" x2="840" y2="446" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="595" y="432" width="235" height="22" rx="11" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="712" y="447" text-anchor="middle" font-size="10" fill="#991b1b">screenRepository.save(screen) → screens [theater_id FK]</text>

  <!-- ==================== STEP 4: SEAT LAYOUT ==================== -->
  <rect x="20" y="475" width="960" height="24" rx="4" fill="#e2e8f0"/>
  <text x="500" y="492" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">4. Seat Layout Configuration</text>

  <line x1="110" y1="515" x2="300" y2="515" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="120" y="501" width="195" height="22" rx="11" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="217" y="516" text-anchor="middle" font-size="10" fill="#1d4ed8">POST /api/admin/seats</text>

  <line x1="320" y1="533" x2="555" y2="533" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="345" y="519" width="200" height="22" rx="11" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="445" y="534" text-anchor="middle" font-size="10" fill="#065f46">seatLayoutService.configureSeats(req)</text>

  <line x1="575" y1="551" x2="840" y2="551" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="595" y="537" width="240" height="22" rx="11" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="715" y="552" text-anchor="middle" font-size="10" fill="#991b1b">seatRepository.saveAll(seats) → seats [screen_id FK]</text>

  <!-- ==================== STEP 5: CREATE MOVIE (NEW!) ==================== -->
  <rect x="20" y="580" width="960" height="24" rx="4" fill="#d1fae5"/>
  <text x="500" y="597" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">5. Movie Creation</text>
  <rect x="840" y="580" width="40" height="14" rx="3" fill="url(#newBadge)"/>
  <text x="860" y="590" text-anchor="middle" font-size="7" font-weight="bold" fill="white">NEW</text>

  <line x1="110" y1="620" x2="300" y2="620" stroke="#10b981" stroke-width="2" marker-end="url(#arrowHead)"/>
  <rect x="130" y="606" width="175" height="22" rx="11" fill="#d1fae5" stroke="#34d399" stroke-width="1"/>
  <text x="217" y="621" text-anchor="middle" font-size="10" font-weight="bold" fill="#065f46">POST /api/admin/movies</text>

  <line x1="320" y1="638" x2="555" y2="638" stroke="#10b981" stroke-width="2" marker-end="url(#arrowHead)"/>
  <rect x="345" y="624" width="195" height="22" rx="11" fill="#d1fae5" stroke="#34d399" stroke-width="1"/>
  <text x="442" y="639" text-anchor="middle" font-size="10" fill="#065f46">movieService.createMovie(request)</text>

  <line x1="575" y1="656" x2="840" y2="656" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="595" y="642" width="240" height="22" rx="11" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="715" y="657" text-anchor="middle" font-size="10" fill="#991b1b">movieRepository.save(movie) → movies table</text>

  <line x1="850" y1="674" x2="575" y2="674" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowHead)"/>
  <rect x="610" y="660" width="155" height="22" rx="11" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="687" y="675" text-anchor="middle" font-size="10" fill="#475569">Return Movie entity</text>

  <line x1="565" y1="690" x2="320" y2="690" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowHead)"/>
  <rect x="370" y="676" width="155" height="22" rx="11" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="447" y="691" text-anchor="middle" font-size="10" fill="#475569">Return MovieResponse</text>

  <line x1="310" y1="706" x2="110" y2="706" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowHead)"/>
  <rect x="140" y="692" width="155" height="22" rx="11" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="217" y="707" text-anchor="middle" font-size="10" fill="#475569">201 Created + movieId</text>

  <!-- ==================== STEP 6: CREATE SHOW ==================== -->
  <rect x="20" y="735" width="960" height="24" rx="4" fill="#e2e8f0"/>
  <text x="500" y="752" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">6. Show Creation (now references movie_id)</text>

  <line x1="110" y1="775" x2="300" y2="775" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="130" y="761" width="170" height="22" rx="11" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="215" y="776" text-anchor="middle" font-size="10" fill="#1d4ed8">POST /api/admin/shows</text>

  <line x1="320" y1="793" x2="555" y2="793" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="345" y="779" width="210" height="22" rx="11" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="450" y="794" text-anchor="middle" font-size="10" fill="#065f46">showService.createShow({ movieId, screenId, ...})</text>

  <line x1="575" y1="811" x2="840" y2="811" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="595" y="797" width="240" height="22" rx="11" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="715" y="812" text-anchor="middle" font-size="10" fill="#991b1b">showRepository.save(show) → shows [screen_id, movie_id FK]</text>

  <line x1="850" y1="829" x2="575" y2="829" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowHead)"/>
  <rect x="610" y="815" width="155" height="22" rx="11" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="687" y="830" text-anchor="middle" font-size="10" fill="#475569">Return Show entity</text>

  <line x1="565" y1="846" x2="320" y2="846" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowHead)"/>
  <rect x="370" y="832" width="155" height="22" rx="11" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="447" y="847" text-anchor="middle" font-size="10" fill="#475569">Return ShowResponse</text>

  <line x1="310" y1="862" x2="110" y2="862" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowHead)"/>
  <rect x="140" y="848" width="155" height="22" rx="11" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="217" y="863" text-anchor="middle" font-size="10" fill="#475569">201 Created + show details</text>
</svg>
