<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 L2,3.5 Z" fill="#64748b"/>
    </marker>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="650" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Authentication Flow — Sequence Diagram</text>
  <text x="500" y="48" text-anchor="middle" font-size="12" fill="#64748b">JWT Token-based authentication with RSA-256 signing</text>

  <!-- ==================== LIFELINES ==================== -->
  <g>
    <!-- Client -->
    <rect x="80" y="65" width="90" height="28" rx="14" filter="url(#shadow)" fill="#3b82f6"/>
    <text x="125" y="83" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Client</text>
    <line x1="125" y1="93" x2="125" y2="610" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,4"/>

    <!-- AuthController -->
    <rect x="320" y="65" width="120" height="28" rx="14" filter="url(#shadow)" fill="#64748b"/>
    <text x="380" y="83" text-anchor="middle" font-size="11" font-weight="bold" fill="white">AuthController</text>
    <line x1="380" y1="93" x2="380" y2="610" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4"/>

    <!-- LoginService -->
    <rect x="590" y="65" width="110" height="28" rx="14" filter="url(#shadow)" fill="#10b981"/>
    <text x="645" y="83" text-anchor="middle" font-size="11" font-weight="bold" fill="white">LoginService</text>
    <line x1="645" y1="93" x2="645" y2="610" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,4"/>

    <!-- JwtTokenProvider -->
    <rect x="840" y="65" width="140" height="28" rx="14" filter="url(#shadow)" fill="#f59e0b"/>
    <text x="910" y="83" text-anchor="middle" font-size="11" font-weight="bold" fill="white">JwtTokenProvider</text>
    <line x1="910" y1="93" x2="910" y2="610" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,4"/>
  </g>

  <!-- ==================== REGISTRATION FLOW ==================== -->

  <!-- Section header -->
  <rect x="20" y="110" width="960" height="24" rx="4" fill="#e2e8f0"/>
  <text x="500" y="127" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">Registration Flow</text>

  <!-- POST /api/auth/register -->
  <line x1="135" y1="150" x2="370" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="155" y="136" width="195" height="22" rx="11" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="252" y="151" text-anchor="middle" font-size="10" fill="#1d4ed8">POST /api/auth/register</text>
  <text x="150" y="165" font-size="9" fill="#64748b">(username, email, password, name, role)</text>

  <line x1="390" y1="175" x2="635" y2="175" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="410" y="161" width="200" height="22" rx="11" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="510" y="176" text-anchor="middle" font-size="10" fill="#065f46">userService.registerUser()</text>

  <line x1="655" y1="190" x2="635" y2="190" stroke="#64748b" stroke-width="1.5"/>
  <text x="660" y="195" font-size="9" fill="#047857">Validate fields, hash password (BCrypt)</text>

  <line x1="655" y1="205" x2="655" y2="205" stroke="#64748b" stroke-width="1.5"/>
  <text x="660" y="210" font-size="9" fill="#047857">Check duplicate username/email</text>

  <line x1="655" y1="220" x2="655" y2="220" stroke="#64748b" stroke-width="1.5"/>
  <text x="660" y="225" font-size="9" fill="#047857">Save to users table</text>

  <line x1="645" y1="240" x2="380" y2="240" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowHead)"/>
  <rect x="420" y="226" width="180" height="22" rx="11" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="510" y="241" text-anchor="middle" font-size="10" fill="#475569">Return UserResponse</text>

  <line x1="380" y1="258" x2="135" y2="258" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowHead)"/>
  <rect x="165" y="244" width="170" height="22" rx="11" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="250" y="259" text-anchor="middle" font-size="10" fill="#475569">201 Created + user data</text>

  <!-- ==================== LOGIN FLOW ==================== -->

  <!-- Section header -->
  <rect x="20" y="290" width="960" height="24" rx="4" fill="#e2e8f0"/>
  <text x="500" y="307" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">Login / JWT Token Generation</text>

  <!-- POST /api/auth/login -->
  <line x1="135" y1="330" x2="370" y2="330" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="155" y="316" width="195" height="22" rx="11" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="252" y="331" text-anchor="middle" font-size="10" fill="#1d4ed8">POST /api/auth/login</text>
  <text x="150" y="345" font-size="9" fill="#64748b">(username, password)</text>

  <line x1="390" y1="355" x2="635" y2="355" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="410" y="341" width="200" height="22" rx="11" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="510" y="356" text-anchor="middle" font-size="10" fill="#065f46">loginService.authenticate(request)</text>

  <line x1="655" y1="372" x2="655" y2="372" stroke="#64748b" stroke-width="1.5"/>
  <text x="660" y="377" font-size="9" fill="#047857">Lookup user in DB by username</text>

  <!-- User check -->
  <line x1="655" y1="390" x2="910" y2="390" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="675" y="376" width="215" height="22" rx="11" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="782" y="391" text-anchor="middle" font-size="10" fill="#991b1b">UserRepository.findByUsername()</text>

  <line x1="910" y1="408" x2="655" y2="408" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowHead)"/>
  <rect x="700" y="394" width="155" height="22" rx="11" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="777" y="409" text-anchor="middle" font-size="10" fill="#475569">Return User entity</text>

  <!-- Verify -->
  <line x1="655" y1="425" x2="655" y2="425" stroke="#64748b" stroke-width="1.5"/>
  <text x="660" y="430" font-size="9" fill="#047857">Verify password (BCrypt.matches)</text>

  <line x1="655" y1="442" x2="655" y2="442" stroke="#64748b" stroke-width="1.5"/>
  <text x="660" y="447" font-size="9" fill="#047857">Check if user is active</text>

  <!-- Generate token -->
  <line x1="655" y1="460" x2="900" y2="460" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="678" y="446" width="205" height="22" rx="11" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  <text x="780" y="461" text-anchor="middle" font-size="10" fill="#92400e">generateToken(username, roles)</text>

  <line x1="910" y1="478" x2="910" y2="478" stroke="#64748b" stroke-width="1.5"/>
  <text x="780" y="483" text-anchor="middle" font-size="9" fill="#92400e">Sign with RSA Private Key → JWT string</text>

  <line x1="910" y1="495" x2="655" y2="495" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowHead)"/>
  <rect x="710" y="481" width="155" height="22" rx="11" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="787" y="496" text-anchor="middle" font-size="10" fill="#475569">Return JWT token</text>

  <!-- Response -->
  <line x1="645" y1="515" x2="380" y2="515" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowHead)"/>
  <rect x="420" y="501" width="180" height="22" rx="11" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="510" y="516" text-anchor="middle" font-size="10" fill="#475569">Return AuthResponse (token)</text>

  <line x1="380" y1="535" x2="135" y2="535" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowHead)"/>
  <rect x="155" y="521" width="195" height="22" rx="11" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="252" y="536" text-anchor="middle" font-size="10" fill="#475569">200 OK + { token, username, role }</text>

  <!-- ==================== API CALL EXAMPLE ==================== -->

  <!-- Section header -->
  <rect x="20" y="570" width="960" height="24" rx="4" fill="#e2e8f0"/>
  <text x="500" y="587" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">Authenticated API Call (requiring JWT)</text>

  <line x1="135" y1="610" x2="370" y2="610" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="155" y="596" width="210" height="22" rx="11" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="260" y="611" text-anchor="middle" font-size="10" fill="#1d4ed8">GET /api/bookings (Authorization: Bearer &lt;token&gt;)</text>

</svg>