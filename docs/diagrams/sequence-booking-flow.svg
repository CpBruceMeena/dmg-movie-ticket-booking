<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 850" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 L2,3.5 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowReturn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" stroke-dasharray="3,2">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="850" fill="#f8fafc" rx="8"/>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Booking Lifecycle — Sequence Diagram</text>
  <text x="500" y="48" text-anchor="middle" font-size="12" fill="#64748b">From seat selection to booking confirmation, cancellation, and refund</text>

  <!-- Lifelines -->
  <g transform="translate(0, 0)">
    <!-- Customer -->
    <rect x="95" y="65" width="20" height="20" rx="4" fill="#3b82f6"/>
    <text x="105" y="102" text-anchor="middle" font-size="11" fill="#1e293b" font-weight="bold">Customer</text>
    <line x1="105" y1="85" x2="105" y2="810" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,4"/>

    <!-- System Boundary -->
    <rect x="335" y="65" width="20" height="20" rx="4" fill="#64748b"/>
    <text x="345" y="102" text-anchor="middle" font-size="11" fill="#1e293b" font-weight="bold">API Controllers</text>
    <line x1="345" y1="85" x2="345" y2="810" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4"/>

    <!-- BookingService -->
    <rect x="575" y="65" width="20" height="20" rx="4" fill="#10b981"/>
    <text x="585" y="102" text-anchor="middle" font-size="11" fill="#1e293b" font-weight="bold">BookingService</text>
    <line x1="585" y1="85" x2="585" y2="810" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,4"/>

    <!-- SeatHoldManager -->
    <rect x="810" y="65" width="20" height="20" rx="4" fill="#f59e0b"/>
    <text x="820" y="102" text-anchor="middle" font-size="11" fill="#1e293b" font-weight="bold">SeatHoldManager</text>
    <line x1="820" y1="85" x2="820" y2="810" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,4"/>
  </g>

  <!-- === STEP 1: Browse shows === -->
  <text x="15" y="130" font-size="10" fill="#64748b" font-family="monospace">1.</text>
  <line x1="115" y1="140" x2="335" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="138" y="126" width="195" height="20" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="235" y="139" text-anchor="middle" font-size="10" fill="#1d4ed8">GET /api/shows?theaterId=...</text>

  <line x1="345" y1="155" x2="575" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="370" y="141" width="200" height="20" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="470" y="154" text-anchor="middle" font-size="10" fill="#065f46">showService.getShows()</text>

  <line x1="585" y1="170" x2="345" y2="170" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowHead)"/>
  <rect x="390" y="156" width="170" height="20" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="475" y="169" text-anchor="middle" font-size="10" fill="#475569">Return show list</text>

  <line x1="335" y1="185" x2="115" y2="185" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowHead)"/>
  <rect x="145" y="171" width="150" height="20" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="220" y="184" text-anchor="middle" font-size="10" fill="#475569">Return shows + seats</text>

  <!-- === STEP 2: View seat availability === -->
  <text x="15" y="220" font-size="10" fill="#64748b" font-family="monospace">2.</text>
  <line x1="115" y1="230" x2="335" y2="230" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="130" y="216" width="210" height="20" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="235" y="229" text-anchor="middle" font-size="10" fill="#1d4ed8">GET /api/shows/{id}/seats</text>

  <line x1="345" y1="245" x2="575" y2="245" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="365" y="231" width="210" height="20" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="470" y="244" text-anchor="middle" font-size="10" fill="#065f46">getSeatAvailability(showId)</text>

  <line x1="585" y1="260" x2="810" y2="260" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="605" y="246" width="195" height="20" rx="10" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  <text x="702" y="259" text-anchor="middle" font-size="10" fill="#92400e">getAllHeldSeatIds(showId)</text>

  <line x1="820" y1="275" x2="585" y2="275" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowHead)"/>
  <rect x="640" y="261" width="130" height="20" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="705" y="274" text-anchor="middle" font-size="10" fill="#475569">Return held seat IDs</text>

  <!-- === STEP 3: Hold seats === -->
  <text x="15" y="310" font-size="10" fill="#64748b" font-family="monospace">3.</text>
  <line x1="115" y1="320" x2="335" y2="320" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="145" y="306" width="200" height="20" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="245" y="319" text-anchor="middle" font-size="10" fill="#1d4ed8">POST /api/bookings/hold</text>

  <line x1="345" y1="335" x2="575" y2="335" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="370" y="321" width="200" height="20" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="470" y="334" text-anchor="middle" font-size="10" fill="#065f46">holdSeats(request, userId)</text>

  <line x1="585" y1="350" x2="810" y2="350" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="600" y="336" width="210" height="20" rx="10" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  <text x="705" y="349" text-anchor="middle" font-size="10" fill="#92400e">holdSeats(showId, seatIds, userId, duration)</text>

  <line x1="820" y1="365" x2="585" y2="365" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowHead)"/>
  <rect x="660" y="351" width="110" height="20" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="715" y="364" text-anchor="middle" font-size="10" fill="#475569">Return success</text>

  <!-- DB Save -->
  <line x1="585" y1="380" x2="820" y2="380" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="612" y="366" width="190" height="20" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="707" y="379" text-anchor="middle" font-size="10" fill="#991b1b">bookingRepository.save(booking)</text>

  <!-- === STEP 4: Payment (with optional discount) === -->
  <text x="15" y="425" font-size="10" fill="#64748b" font-family="monospace">4.</text>
  <line x1="115" y1="435" x2="335" y2="435" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="145" y="421" width="200" height="20" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="253" y="434" text-anchor="middle" font-size="10" fill="#1d4ed8">POST /api/bookings/{id}/pay</text>

  <line x1="345" y1="450" x2="575" y2="450" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="365" y="436" width="210" height="20" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="470" y="449" text-anchor="middle" font-size="10" fill="#065f46">processPayment(bookingId, userId, code)</text>

  <!-- Validate discount -->
  <line x1="585" y1="465" x2="575" y2="465" stroke="#10b981" stroke-width="1"/>
  <text x="590" y="470" font-size="9" fill="#047857">Validate discount code</text>

  <line x1="585" y1="480" x2="820" y2="480" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="612" y="466" width="190" height="20" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="707" y="479" text-anchor="middle" font-size="10" fill="#991b1b">bookingRepository.save()</text>

  <line x1="585" y1="495" x2="820" y2="495" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="620" y="481" width="175" height="20" rx="10" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  <text x="707" y="494" text-anchor="middle" font-size="10" fill="#92400e">Mark discount code used</text>

  <!-- Async notification -->
  <line x1="585" y1="510" x2="345" y2="510" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowHead)"/>
  <rect x="400" y="496" width="150" height="20" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="475" y="509" text-anchor="middle" font-size="10" fill="#475569">Return BookingResponse</text>

  <line x1="335" y1="525" x2="115" y2="525" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowHead)"/>
  <rect x="155" y="511" width="150" height="20" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="230" y="524" text-anchor="middle" font-size="10" fill="#475569">Return booking confirmed</text>

  <!-- === STEP 5: Cancel === -->
  <text x="15" y="570" font-size="10" fill="#64748b" font-family="monospace">5.</text>
  <line x1="115" y1="580" x2="335" y2="580" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="145" y="566" width="200" height="20" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="253" y="579" text-anchor="middle" font-size="10" fill="#1d4ed8">POST /api/bookings/{id}/cancel</text>

  <line x1="345" y1="595" x2="575" y2="595" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="380" y="581" width="185" height="20" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="472" y="594" text-anchor="middle" font-size="10" fill="#065f46">cancelBooking(bookingId, userId)</text>

  <line x1="585" y1="610" x2="820" y2="610" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="615" y="596" width="195" height="20" rx="10" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  <text x="712" y="609" text-anchor="middle" font-size="10" fill="#92400e">releaseSeats(showId, seatIds)</text>

  <!-- === STEP 6: Refund === -->
  <text x="15" y="655" font-size="10" fill="#64748b" font-family="monospace">6.</text>
  <line x1="115" y1="665" x2="335" y2="665" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="145" y="651" width="200" height="20" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="253" y="664" text-anchor="middle" font-size="10" fill="#1d4ed8">POST /api/bookings/{id}/refund</text>

  <line x1="345" y1="680" x2="575" y2="680" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="380" y="666" width="185" height="20" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="472" y="679" text-anchor="middle" font-size="10" fill="#065f46">refundBooking(bookingId, userId)</text>

  <!-- Calculate refund -->
  <line x1="585" y1="695" x2="575" y2="695" stroke="#10b981" stroke-width="1"/>
  <text x="590" y="700" font-size="9" fill="#047857">Lookup refund policy → calculate amount</text>

  <line x1="585" y1="710" x2="820" y2="710" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowHead)"/>
  <rect x="615" y="696" width="195" height="20" rx="10" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  <text x="712" y="709" text-anchor="middle" font-size="10" fill="#92400e">releaseSeats(showId, seatIds)</text>

  <line x1="585" y1="725" x2="820" y2="725" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="612" y="711" width="190" height="20" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="707" y="724" text-anchor="middle" font-size="10" fill="#991b1b">Save booking (REFUNDED + refund amount)</text>

  <!-- ==================== LEGEND ==================== -->
  <g transform="translate(30, 755)">
    <rect width="940" height="85" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="470" y="18" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e293b">Booking States &amp; Transitions</text>
    <rect x="30" y="28" width="100" height="22" rx="11" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
    <text x="80" y="43" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">PENDING_PAYMENT</text>
    <text x="140" y="43" font-size="14" fill="#64748b">→</text>
    <rect x="160" y="28" width="90" height="22" rx="11" fill="#34d399" stroke="#10b981" stroke-width="1"/>
    <text x="205" y="43" text-anchor="middle" font-size="10" font-weight="bold" fill="#065f46">CONFIRMED</text>
    <text x="260" y="43" font-size="14" fill="#64748b">→</text>
    <rect x="280" y="28" width="90" height="22" rx="11" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
    <text x="325" y="43" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">CANCELLED</text>
    <text x="380" y="43" font-size="14" fill="#64748b">→</text>
    <rect x="400" y="28" width="90" height="22" rx="11" fill="#a78bfa" stroke="#8b5cf6" stroke-width="1"/>
    <text x="445" y="43" text-anchor="middle" font-size="10" font-weight="bold" fill="#4c1d95">REFUNDED</text>

    <text x="30" y="70" font-size="10" fill="#64748b">Seat Holds auto-release after 5 min → Booking auto-cancelled → Seats returned to pool</text>
  </g>
</svg>