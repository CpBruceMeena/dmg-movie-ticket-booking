# H2 In-Memory Database for Testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate for H2
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT Configuration (RSA keys - use test keys)
jwt.private-key-path=keys/private.pem
jwt.public-key-path=keys/public.pem
jwt.expiration-ms=86400000

# Rate Limiting (high threshold for tests)
rate.limit.max-requests=1000
rate.limit.window-minutes=1

# Booking Configuration
booking.hold.manager=in-memory
booking.hold.duration-minutes=5
booking.hold.cleanup-interval-seconds=60

# Logging
logging.level.com.dmg.moviebooking=WARN
