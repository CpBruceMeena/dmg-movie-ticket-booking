# Application
spring.application.name=dmg-movie-ticket-booking
server.port=${SERVER_PORT:8080}

# PostgreSQL Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/movie-ticket-booking}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration (RSA keys)
jwt.private-key-path=${JWT_PRIVATE_KEY_PATH:keys/private.pem}
jwt.public-key-path=${JWT_PUBLIC_KEY_PATH:keys/public.pem}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Rate Limiting (Sliding Window)
rate.limit.max-requests=${RATE_LIMIT_MAX_REQUESTS:100}
rate.limit.window-minutes=${RATE_LIMIT_WINDOW_MINUTES:1}

# In-Memory Caching (for Spring cache abstraction)
spring.cache.type=simple

# Redis Configuration (for distributed seat hold management)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.timeout=2000ms

# Seat Hold Manager (redis or in-memory)
booking.hold.manager=${HOLD_MANAGER:redis}
booking.hold.duration-minutes=5
booking.hold.cleanup-interval-seconds=30

# Logging
logging.level.com.dmg.moviebooking=DEBUG
