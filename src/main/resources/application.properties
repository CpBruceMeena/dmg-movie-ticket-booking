# Application
spring.application.name=dmg-movie-ticket-booking
server.port=8080

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/movie-ticket-booking
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=dmg-movie-booking-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
jwt.expiration-ms=86400000

# Rate Limiting (Sliding Window)
rate.limit.max-requests=100
rate.limit.window-minutes=1

# Logging
logging.level.com.dmg.moviebooking=DEBUG
