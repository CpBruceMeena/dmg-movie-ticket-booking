# Application
spring.application.name=dmg-movie-ticket-booking
server.port=${SERVER_PORT:8080}

# PostgreSQL Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/movie-ticket-booking}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Rate Limiting (Sliding Window)
rate.limit.max-requests=${RATE_LIMIT_MAX_REQUESTS:100}
rate.limit.window-minutes=${RATE_LIMIT_WINDOW_MINUTES:1}

# In-Memory Caching
spring.cache.type=simple

# Logging
logging.level.com.dmg.moviebooking=DEBUG
