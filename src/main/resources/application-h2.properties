# H2 In-Memory Database (for local development/testing)
spring.datasource.url=jdbc:h2:mem:movieticketbooking;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate for H2
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Flyway is disabled for H2 (local dev). Migrations are PostgreSQL-specific.
# Use the default PostgreSQL profile for Flyway-managed environments.
spring.flyway.enabled=false

# H2 Console (accessible at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration (RSA keys)
jwt.private-key-path=keys/private.pem
jwt.public-key-path=keys/public.pem
jwt.expiration-ms=86400000

# Rate Limiting
rate.limit.max-requests=100
rate.limit.window-minutes=1

# Seat Hold Manager (use in-memory for local H2 testing)
booking.hold.manager=in-memory
