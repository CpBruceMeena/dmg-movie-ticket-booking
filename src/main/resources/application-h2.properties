# H2 In-Memory Database (for local development/testing)
spring.datasource.url=jdbc:h2:mem:movieticketbooking;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate for H2
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 Console (accessible at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration (default secret for local dev)
jwt.secret=dmg-local-dev-secret-key-that-is-at-least-256-bits-long-for-hs256
jwt.expiration-ms=86400000

# Rate Limiting
rate.limit.max-requests=100
rate.limit.window-minutes=1
